<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Yadira 💖</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #0a0a2a, #000);
  font-family: Arial, sans-serif;
}

/* Estrellas */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: transparent;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* Galaxia */
.galaxy {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, #ff00cc, #3333ff, transparent);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: spin 25s linear infinite;
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Texto orbitando */
.orbit {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 450px;
  height: 450px;
  transform: translate(-50%, -50%);
  animation: rotateText 20s linear infinite;
}

@keyframes rotateText {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(-360deg); }
}

.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: 0 0;
  font-size: 26px;
  color: white;
  text-shadow: 0 0 10px pink;
}

/* Corazones bien hechos */
.heart {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  animation: float 6s infinite linear;
}

@keyframes float {
  from {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  to {
    transform: translateY(-800px) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="galaxy"></div>
<div class="orbit" id="orbit"></div>

<script>
// 🌟 Crear estrellas
for (let i = 0; i < 150; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * window.innerHeight + "px";
  star.style.left = Math.random() * window.innerWidth + "px";
  document.getElementById("stars").appendChild(star);
}

// 💬 FRASES (edítalas tú)
const frases = [
  "Te amo 💖",
  "Eres mi universo 🌌",
  "Mi Yadira hermosa ✨",
  "Siempre contigo ❤️",
  "Eres mi galaxia 🌠",
  "Mi todo 💕"
];

// 🌀 Colocar texto en círculo
const orbit = document.getElementById("orbit");
const radius = 200;

frases.forEach((texto, i) => {
  let angle = (i / frases.length) * (2 * Math.PI);

  let x = radius * Math.cos(angle);
  let y = radius * Math.sin(angle);

  let span = document.createElement("div");
  span.className = "text";
  span.innerText = texto;

  span.style.transform = `translate(${x}px, ${y}px)`;

  orbit.appendChild(span);
});

// ❤️ Corazones bonitos
function crearCorazon() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = window.innerHeight + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
