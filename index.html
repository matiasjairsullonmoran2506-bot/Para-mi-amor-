<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Yadira 💖</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    .frase {
      position: absolute;
      color: white;
      font-size: 20px;
      pointer-events: none;
      transition: transform 0.1s;
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 40;

// 🌌 Crear galaxia espiral
const particles = 4000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particles * 3);

for (let i = 0; i < particles; i++) {
  const i3 = i * 3;

  const radius = Math.random() * 20;
  const angle = radius * 1.5;

  positions[i3] = Math.cos(angle) * radius;
  positions[i3 + 1] = (Math.random() - 0.5) * 2;
  positions[i3 + 2] = Math.sin(angle) * radius;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.2
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

// 💖 FRASES FLOTANTES
const palabras = [
  "Mi niña 💖",
  "Mi princesa 👑",
  "Mi todo 💫",
  "Mi amor ❤️",
  "Mi vida 🥰",
  "Mi cielo ✨"
];

const elementos = [];

palabras.forEach((texto, i) => {
  const div = document.createElement("div");
  div.className = "frase";
  div.innerText = texto;

  document.body.appendChild(div);

  elementos.push({
    element: div,
    angle: Math.random() * Math.PI * 2,
    radius: 15 + Math.random() * 10,
    speed: 0.002 + Math.random() * 0.002
  });
});

// 🖱️ Movimiento
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (event) => {
  mouseX = (event.clientX - window.innerWidth/2) / 200;
  mouseY = (event.clientY - window.innerHeight/2) / 200;
});

// 🔄 Animación
function animate() {
  requestAnimationFrame(animate);

  galaxy.rotation.y += 0.002;

  camera.position.x += (mouseX - camera.position.x) * 0.05;
  camera.position.y += (-mouseY - camera.position.y) * 0.05;

  camera.lookAt(scene.position);

  // mover palabras
  elementos.forEach(obj => {
    obj.angle += obj.speed;

    const x = Math.cos(obj.angle) * obj.radius;
    const y = Math.sin(obj.angle) * obj.radius;

    obj.element.style.transform = 
      `translate(${window.innerWidth/2 + x*10}px, ${window.innerHeight/2 + y*5}px)`;
  });

  renderer.render(scene, camera);
}

animate();

// 📱 Ajuste pantalla
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
