<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Yadira 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(black, #020024);
  font-family: Arial, sans-serif;
}

.frase {
  position: absolute;
  color: white;
  font-size: 18px;
  pointer-events: none;
  text-shadow: 0 0 10px pink;
}

#mensaje {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 30px;
}
</style>
</head>

<body>

<div id="mensaje">Yadira… eres mi universo 💫</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 40;

// 🌌 GALAXIA
const particles = 5000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particles * 3);

for (let i = 0; i < particles; i++) {
  let i3 = i * 3;
  let r = Math.random() * 20;
  let a = r * 2;

  positions[i3] = Math.cos(a) * r;
  positions[i3+1] = (Math.random()-0.5)*3;
  positions[i3+2] = Math.sin(a) * r;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
  color: 0xffccff,
  size: 0.3
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

// 💖 CORAZONES
const hearts = [];
for(let i=0;i<40;i++){
  const geo = new THREE.SphereGeometry(1,16,16);
  const mat = new THREE.MeshBasicMaterial({color:0xff1493});
  const h = new THREE.Mesh(geo,mat);

  h.position.set(
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20
  );

  scene.add(h);
  hearts.push(h);
}

// 💫 FRASES
const palabras = [
  "Mi niña 💖","Mi princesa 👑","Mi amor ❤️",
  "Mi vida 🥰","Mi cielo ✨","Mi todo 💫"
];

const elementos = [];

palabras.forEach(texto=>{
  const div = document.createElement("div");
  div.className="frase";
  div.innerText=texto;
  document.body.appendChild(div);

  elementos.push({
    element:div,
    angle:Math.random()*Math.PI*2,
    radius:15+Math.random()*10,
    speed:0.01
  });
});

// movimiento
let mouseX=0, mouseY=0;

addEventListener("mousemove",e=>{
  mouseX=(e.clientX-innerWidth/2)/100;
  mouseY=(e.clientY-innerHeight/2)/100;
});

// animación
function animate(){
  requestAnimationFrame(animate);

  galaxy.rotation.y += 0.002;

  hearts.forEach(h=>{
    h.rotation.y += 0.05;
  });

  camera.position.x += (mouseX - camera.position.x)*0.05;
  camera.position.y += (-mouseY - camera.position.y)*0.05;
  camera.lookAt(scene.position);

  elementos.forEach(obj=>{
    obj.angle += obj.speed;

    let x=Math.cos(obj.angle)*obj.radius;
    let y=Math.sin(obj.angle)*obj.radius;

    obj.element.style.left = (innerWidth/2 + x*10) + "px";
    obj.element.style.top = (innerHeight/2 + y*5) + "px";
  });

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
  </html>
