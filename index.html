<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Yadira 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #020024, #000);
  font-family: Arial, sans-serif;
}

.frase {
  position: absolute;
  color: white;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 20px #ff69b4;
}

#mensaje {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  font-size: 40px;
  color: white;
  animation: fade 3s forwards;
}

#boton {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 25px;
  background: #ff1493;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 0 20px pink;
}

#carta {
  display: none;
  position: absolute;
  top: 20%;
  left: 10%;
  width: 80%;
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 20px;
  border-radius: 15px;
}

@keyframes fade {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<div id="mensaje">Yadira… eres mi universo 💫</div>
<div id="boton">💌 Toca aquí</div>

<div id="carta">
  <h2>Para ti 💖</h2>
  <p>
    Desde que llegaste a mi vida todo cambió…  
    eres mi felicidad, mi paz y mi lugar favorito.  
    Gracias por estos 2 años conmigo… te amo infinito ❤️
  </p>
</div>

<audio id="musica" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 40;

// 🌌 galaxia
const geo = new THREE.BufferGeometry();
const count = 5000;
const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
  let i3=i*3;
  let r=Math.random()*20;
  let a=r*2;

  pos[i3]=Math.cos(a)*r;
  pos[i3+1]=(Math.random()-0.5)*3;
  pos[i3+2]=Math.sin(a)*r;
}

geo.setAttribute('position', new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({color:0xffccff,size:0.3});
const galaxy = new THREE.Points(geo,mat);
scene.add(galaxy);

// ✨ estrellas fondo
const starsGeo = new THREE.BufferGeometry();
const starsPos = new Float32Array(3000*3);

for(let i=0;i<3000;i++){
  let i3=i*3;
  starsPos[i3]=(Math.random()-0.5)*200;
  starsPos[i3+1]=(Math.random()-0.5)*200;
  starsPos[i3+2]=(Math.random()-0.5)*200;
}

starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos,3));
const stars = new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:0.5}));
scene.add(stars);

// 💖 corazones
const hearts=[];
for(let i=0;i<25;i++){
  const shape=new THREE.Shape();
  shape.moveTo(0,0);
  shape.bezierCurveTo(0,0,-1,-1,-2,0);
  shape.bezierCurveTo(-3,1,-1,3,0,4);
  shape.bezierCurveTo(1,3,3,1,2,0);
  shape.bezierCurveTo(1,-1,0,0,0,0);

  const h=new THREE.Mesh(
    new THREE.ShapeGeometry(shape),
    new THREE.MeshBasicMaterial({color:0xff1493})
  );

  h.scale.set(0.6,0.6,0.6);

  h.position.set(
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20,
    (Math.random()-0.5)*20
  );

  scene.add(h);
  hearts.push(h);
}

// 🌠 estrellas fugaces
function estrellaFugaz(){
  const geo=new THREE.SphereGeometry(0.3,8,8);
  const mat=new THREE.MeshBasicMaterial({color:0xffffff});
  const star=new THREE.Mesh(geo,mat);

  star.position.set(-50, Math.random()*20, 0);
  scene.add(star);

  let speed=1+Math.random()*2;

  function mover(){
    star.position.x += speed;
    star.position.y -= speed*0.3;

    if(star.position.x<50){
      requestAnimationFrame(mover);
    } else {
      scene.remove(star);
    }
  }
  mover();
}

setInterval(estrellaFugaz, 3000);

// 💫 frases
const palabras=["Mi niña 💖","Mi princesa 👑","Mi amor ❤️","Mi vida 🥰","Mi cielo ✨","Mi todo 💫"];
const elementos=[];

palabras.forEach(t=>{
  const d=document.createElement("div");
  d.className="frase";
  d.innerText=t;
  document.body.appendChild(d);

  elementos.push({element:d,angle:Math.random()*6,radius:15,speed:0.01});
});

// 🎵 música + carta
document.getElementById("boton").onclick=()=>{
  document.getElementById("carta").style.display="block";
  document.getElementById("musica").play();
};

// animación
function animate(){
  requestAnimationFrame(animate);

  galaxy.rotation.y+=0.002;
  stars.rotation.y+=0.0005;

  hearts.forEach(h=>h.rotation.y+=0.05);

  elementos.forEach(o=>{
    o.angle+=o.speed;
    let x=Math.cos(o.angle)*o.radius;
    let y=Math.sin(o.angle)*o.radius;

    o.element.style.left=(innerWidth/2 + x*10)+"px";
    o.element.style.top=(innerHeight/2 + y*5)+"px";
  });

  renderer.render(scene,camera);
}
animate();

// resize
addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
